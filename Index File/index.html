  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ly:var(--font);font-size:12px;font-weight:600;padding:9px 16px;border-radius:9999px;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap}\n.hdr-btn:hover{background:rgba(255,255,255,.14)}\n#admin-btn{background:var(--gold);border:none;color:var(--navy);font-weight:700}\n#admin-btn:hover{background:var(--gold-light)}\n\n/* FILTERS */\n.filters{padding:14px 30px;display:flex;gap:8px;flex-wrap:wrap;background:var(--card);border-bottom:1px solid var(--border)}\n.filter-btn{background:var(--card);border:1.5px solid var(--border);color:var(--muted);font-family:var(--font);font-size:12.5px;font-weight:600;padding:8px 16px;border-radius:9999px;cursor:pointer;transition:all .15s}\n.filter-btn:hover{border-color:#C7CBD1;color:var(--navy)}\n.filter-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}\n\n/* MAIN — BANDS */\nmain{padding:8px 30px 40px;background:var(--shell)}\n.band{display:flex;gap:20px;align-items:flex-start;padding:15px 0;border-top:1px solid var(--border)}\n.band:first-child{border-top:none}\n.band-label{width:180px;flex-shrink:0;padding-top:6px}\n.band-label .name{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.06em}\n.band-label .name .mk{width:8px;height:8px;background:var(--gold);border-radius:2px;flex-shrink:0}\n.band-label .name .mk.star{width:auto;height:auto;background:none;color:var(--gold);font-size:13px;line-height:1}\n.band-label .count{font-size:11px;color:var(--faint);font-weight:600;margin-top:5px;padding-left:16px}\n.band-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;flex:1;min-width:0}\n\n/* CARD */\n.card{display:flex;align-items:center;gap:11px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 2px rgba(13,27,46,.05);text-decoration:none;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative}\n.card:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(13,27,46,.10);border-color:#C7CBD1}\n.card.tag-red{border-left:3px solid var(--tag-red)}\n.card.tag-amber{border-left:3px solid var(--tag-amber)}\n.card.tag-purple{border-left:3px solid var(--tag-purple)}\n.card.tag-green{border-left:3px solid var(--tag-green)}\n.card.tag-gray{opacity:.5;cursor:default}\n.card.tag-gray:hover{transform:none;box-shadow:0 1px 2px rgba(13,27,46,.05);border-color:var(--border)}\n.card.unreachable{cursor:default}\n.card.unreachable:hover{transform:none}\n.card-mono{position:relative;flex-shrink:0}\n.mono-tile{width:38px;height:38px;border-radius:10px;background:var(--app-tint);color:var(--app);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;letter-spacing:.01em}\n.status-dot{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--card);background:var(--faint);transition:background .3s}\n.status-dot.checking{background:var(--amber);animation:pulse 1.2s infinite}\n.status-dot.online{background:var(--green)}\n.status-dot.offline{background:var(--red)}\n.status-dot.na{background:#C7CBD1}\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}\n.card-body{flex:1;min-width:0}\n.card-title{font-weight:700;font-size:13.5px;color:var(--navy);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.card-sub{display:flex;align-items:center;gap:8px;margin-top:3px}\n.card-desc{font-size:11px;color:var(--faint);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}\n.badge{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:9999px;font-weight:700;color:var(--muted);background:var(--shell);border:1px solid var(--border);flex-shrink:0}\n.fav-star{background:none;border:none;cursor:pointer;padding:2px;font-size:15px;line-height:1;flex-shrink:0;color:#C7CBD1;transition:color .12s}\n.fav-star.on{color:var(--gold)}\n.fav-star:hover{color:var(--gold)}\n.empty{padding:60px;text-align:center;color:var(--faint);font-size:14px;font-weight:500}\n\n/* MODAL */\n.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,46,.55);z-index:1000;align-items:center;justify-content:center;padding:20px}\n.modal-overlay.open{display:flex}\n.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 24px 60px rgba(13,27,46,.25)}\n.modal h2{font-size:18px;font-weight:800;margin-bottom:5px;color:var(--navy)}\n.modal h2 span{color:var(--gold)}\n.modal-sub{font-size:12.5px;color:var(--muted);margin-bottom:20px}\n.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--faint);font-size:1.1rem;cursor:pointer;line-height:1;padding:4px 8px}\n.modal-close:hover{color:var(--navy)}\n\n/* PASSWORD */\n#pw-screen input{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--ink);font-family:var(--font);font-size:14px;letter-spacing:.06em;margin-bottom:10px;outline:none}\n#pw-screen input:focus{border-color:var(--app);box-shadow:0 0 0 3px rgba(32,32,208,.12)}\n#pw-screen input.error{border-color:var(--red)}\n.pw-error{font-size:12px;color:var(--red);margin-bottom:10px;min-height:15px}\n\n/* BUTTONS */\n.btn-primary{width:100%;background:var(--navy);border:none;border-radius:9999px;padding:12px;color:#fff;font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:.02em;cursor:pointer;transition:background .2s}\n.btn-primary:hover{background:var(--navy-mid)}\n.btn-secondary{background:var(--card);border:1.5px solid var(--border);border-radius:9999px;padding:10px 18px;color:var(--muted);font-family:var(--font);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s}\n.btn-secondary:hover{border-color:#C7CBD1;color:var(--navy)}\n\n/* ADMIN TABS */\n.admin-tabs{display:flex;gap:6px;margin-bottom:20px}\n.admin-tab{flex:1;background:var(--off);border:1.5px solid var(--border);border-radius:9999px;padding:9px;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}\n.admin-tab:hover{border-color:#C7CBD1;color:var(--navy)}\n.admin-tab.active{background:var(--navy);border-color:var(--navy);color:#fff}\n\n/* ITEM LIST */\n#admin-screen{display:none}\n.admin-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}\n.admin-toolbar-left{font-size:12.5px;color:var(--muted)}\n.admin-toolbar-left strong{color:var(--navy)}\n.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}\n.item-row{background:var(--off);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}\n.item-row-info{flex:1;min-width:0}\n.item-row-title{font-size:13.5px;color:var(--navy);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.item-row-meta{font-size:11px;color:var(--faint);margin-top:2px}\n.item-row-tag{width:10px;height:10px;border-radius:50%;flex-shrink:0}\n.item-row-actions{display:flex;gap:5px;flex-shrink:0}\n.icon-btn{background:var(--card);border:1.5px solid var(--border);border-radius:9999px;padding:5px 12px;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}\n.icon-btn:hover{border-color:var(--app);color:var(--app)}\n.icon-btn.delete:hover{border-color:var(--red);color:var(--red)}\n\n/* CATEGORY ORDER */\n#cat-order-screen{display:none}\n.cat-order-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}\n.cat-order-row{background:var(--off);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:grab;user-select:none}\n.cat-order-row:active{cursor:grabbing;border-color:var(--gold)}\n.cat-order-row.drag-over{border-color:var(--gold);background:var(--gold-pale)}\n.cat-drag-handle{color:var(--faint);font-size:1rem;flex-shrink:0}\n.cat-order-name{flex:1;font-size:13.5px;font-weight:700;color:var(--navy)}\n.cat-order-count{font-size:11px;color:var(--faint)}\n\n/* ITEM FORM */\n#item-form-screen{display:none}\n.form-title{font-size:12.5px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}\n.form-row{margin-bottom:13px}\n.form-row label{display:block;font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;font-weight:600;margin-bottom:5px}\n.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--ink);font-family:var(--font);font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s}\n.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--app);box-shadow:0 0 0 3px rgba(32,32,208,.12)}\n.form-row textarea{resize:vertical;min-height:60px}\n.form-hint{font-size:11px;color:var(--faint);margin-top:4px}\n.form-row-inline{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n.form-actions{display:flex;gap:8px;margin-top:20px}\n.form-actions .btn-primary{flex:1}\n\n/* COLOR PICKER in form */\n.color-picker{display:flex;gap:8px;align-items:center;flex-wrap:wrap}\n.color-swatch{width:28px;height:28px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;box-shadow:0 0 0 1px var(--border)}\n.color-swatch:hover{transform:scale(1.15)}\n.color-swatch.selected{border-color:var(--navy);transform:scale(1.1)}\n.color-swatch.swatch-none{background:var(--card)}\n.color-swatch.swatch-red{background:var(--tag-red)}\n.color-swatch.swatch-amber{background:var(--tag-amber)}\n.color-swatch.swatch-purple{background:var(--tag-purple)}\n.color-swatch.swatch-green{background:var(--tag-green)}\n.color-swatch.swatch-g ation Dashboard\">\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <label>Description<\u002Flabel>\n        <textarea id=\"f-desc\" placeholder=\"Short description shown on the card…\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <label>URL<\u002Flabel>\n        <input type=\"text\" id=\"f-url\" placeholder=\"https://…\">\n      <\u002Fdiv>\n      <div class=\"form-row-inline\">\n        <div class=\"form-row\" style=\"margin-bottom:0\">\n          <label>Category<\u002Flabel>\n          <input type=\"text\" id=\"f-category\" placeholder=\"e.g. Transportation\" list=\"cat-list\">\n          <datalist id=\"cat-list\"><option value=\"Dashboards\"><\u002Foption><option value=\"Apps (Internal)\"><\u002Foption><option value=\"Apps (External)\"><\u002Foption><option value=\"Finance\"><\u002Foption><option value=\"AI\"><\u002Foption><option value=\"Sales &amp; Marketing\"><\u002Foption><\u002Fdatalist>\n        <\u002Fdiv>\n        <div class=\"form-row\" style=\"margin-bottom:0\">\n          <label>Location Type<\u002Flabel>\n          <select id=\"f-locationType\">\n            <option value=\"web\">Web<\u002Foption>\n            <option value=\"onedrive\">OneDrive<\u002Foption>\n            <option value=\"nas\">NAS Drive<\u002Foption>\n            <option value=\"local\">Local<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row\" style=\"margin-top:13px\">\n        <label>Color Tag<\u002Flabel>\n        <div class=\"color-picker\" id=\"color-picker\">\n          <div class=\"color-swatch swatch-none\" data-tag=\"none\" onclick=\"selectTag('none')\" title=\"None\"><\u002Fdiv>\n          <div class=\"color-swatch swatch-red selected\" data-tag=\"red\" onclick=\"selectTag('red')\" title=\"Red\"><\u002Fdiv>\n          <div class=\"color-swatch swatch-amber\" data-tag=\"amber\" onclick=\"selectTag('amber')\" title=\"Amber\"><\u002Fdiv>\n          <div class=\"color-swatch swatch-purple\" data-tag=\"purple\" onclick=\"selectTag('purple')\" title=\"Purple\"><\u002Fdiv>\n          <div class=\"color-swatch swatch-green\" data-tag=\"green\" onclick=\"selectTag('green')\" title=\"Green\"><\u002Fdiv>\n          <div class=\"color-swatch swatch-gray\" data-tag=\"gray\" onclick=\"selectTag('gray')\" title=\"Grayed Out (Archived)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-hint\">Gray = archived / inactive. Colored = visual priority tag.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <label>Offline / Placeholder Reason<\u002Flabel>\n        <input type=\"text\" id=\"f-offlineReason\" placeholder=\"e.g. NAS Drive — internal network only\">\n        <div class=\"form-hint\">Shown as tooltip when item has no URL.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-actions\">\n        <button class=\"btn-secondary\" onclick=\"switchTab('items')\">← Back<\u002Fbutton>\n        <button class=\"btn-primary\" onclick=\"saveItem()\">Save Item<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"export-screen\" style=\"display: block;\">\n      <div class=\"export-info\">\n        Downloads an updated <strong>index.html<\u002Fstrong> with all your changes baked in. Upload it to Cloudflare Pages to go live.\n      <\u002Fdiv>\n      <ol class=\"export-steps\">\n        <li>Click <strong>Download index.html<\u002Fstrong> below.<\u002Fli>\n        <li>Go to <strong>dash.cloudflare.com<\u002Fstrong> → Workers &amp; Pages → your <strong>command-center<\u002Fstrong> project.<\u002Fli>\n        <li>Click <strong>Create deployment<\u002Fstrong> → upload a folder containing <strong>index.html<\u002Fstrong> and <strong>logo.png<\u002Fstrong>.<\u002Fli>\n        <li>Done — live in ~30 seconds.<\u002Fli>\n      <\u002Fol>\n      <div style=\"display:flex;gap:8px\">\n        <button class=\"btn-primary\" onclick=\"downloadFile()\">↓ Download index.html<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nlet CATEGORY_ORDER = [\n  \"Dashboards\",\n  \"Apps (External)\",\n  \"Apps (Internal)\",\n  \"AI\",\n  \"Finance\",\n  \"Sales & Marketing\"\n];\n\nlet ITEMS = [\n  {\n    \"title\": \"Trans | Dashboard\",\n    \"desc\": \"Primary transportation management dashboard.\",\n    \"url\": \"https://transportation-dashboard.pages.dev/\",\n    \"category\": \"Dashboards\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"amber\"\n  },\n  {\n    \"title\": \"Trans | Location Metrics\",\n    \"desc\": \"Geographic and location-based performance metrics for Houger Express lanes.\",\n    \"url\": \"https://transportation-location-stats.pages.dev/\",\n    \"category\": \"Dashboards\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"amber\"\n  },\n  {\n    \"title\": \"Trans | Remote Quote Tool\",\n    \"desc\": \"Web-based quoting tool for transportation lanes.\",\n    \"url\": \"https://gray-stone-085e94510.7.azurestaticapps.net/\",\n    \"category\": \"Apps (Internal)\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"amber\"\n  },\n  {\n    \"title\": \"Driver Trailer Inspection (Admin)\",\n    \"desc\": \"Admin console for viewing inspections and updating items.\",\n    \"url\": \"https://trailer-inspection.bjrjtx.workers.dev/admin\",\n    \"category\": \"Apps (External)\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"amber\"\n  },\n  {\n    \"title\": \"Driver Trailer Inspection (Driver)\",\n    \"desc\": \"App drivers use to record trailer inspections.\",\n    \"url\": \"https://trailer-inspection.bjrjtx.workers.dev/\",\n    \"category\": \"Apps (External)\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"amber\"\n  },\n  {\n    \"title\": \"Driver Load Assignments (Admin)\",\n    \"desc\": \"\",\n    \"url\": \"https://driver-load-assignments.bjrjtx.workers.dev/admin\",\n    \"category\": \"Apps (External)\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"amber\"\n  },\n  {\n    \"title\": \"Driver Load Assignments (Driver)\",\n    \"desc\": \"\",\n    \"url\": \"https://driver-load-assignments.bjrjtx.workers.dev/\",\n    \"category\": \"Apps (External)\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"amber\"\n  },\n  {\n    \"title\": \"Warehouse Space Utilization Calculator\",\n    \"desc\": \"Calculate and visualize warehouse space capacity and utilization.\",\n    \"url\": \"https://warehouse-space-utilization.pages.dev/\",\n    \"category\": \"Apps (Internal)\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"green\"\n  },\n  {\n    \"title\": \"Team Checklist\",\n    \"desc\": \"Daily/Weekly checklist for individuals.\",\n    \"url\": \"https://success-checklist.vercel.app/admin\",\n    \"category\": \"Apps (Internal)\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"red\"\n  },\n  {\n    \"title\": \"Opportunity Cash Flow / P&L\",\n    \"desc\": \"\",\n    \"url\": \"https://rfmx-cashflow.bjrjtx.workers.dev\",\n    \"category\": \"Finance\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"red\"\n  },\n  {\n    \"title\": \"Extensive API Setup (Daita Dynamics)\",\n    \"desc\": \"Instructions on getting Extensive API from Extensiv.\",\n    \"url\": \"https://extensiv-api-setup.pages.dev/\",\n    \"category\": \"AI\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"purple\"\n  },\n  {\n    \"title\": \"Cabinet Pricing Tool (Customer)\",\n    \"desc\": \"Cabinet delivery rate calculator for installer accounts. Covers 643 ZIP codes with mountain/western slope surcharges.\",\n    \"url\": \"https://rfmx-delivery-calculator.web.app/\",\n    \"category\": \"Apps (External)\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"green\"\n  },\n  {\n    \"title\": \"HTML Elements Guide\",\n    \"desc\": \"Claude-designed UI component and HTML reference guide.\",\n    \"url\": \"https://dashboard-elements-guide.pages.dev/\",\n    \"category\": \"AI\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"purple\"\n  },\n  {\n    \"title\": \"Trailer Dashboard\",\n    \"desc\": \"Live trailer fleet tracking and yard management view.\",\n    \"url\": \"https://trailer-dashboard.pages.dev/\",\n    \"category\": \"Dashboards\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"gray\"\n  },\n  {\n    \"title\": \"LinkedIn Playbook\",\n    \"desc\": \"Outreach strategies, messaging templates, and BD guidance for LinkedIn prospecting.\",\n    \"url\": \"https://linkedin-management.pages.dev/\",\n    \"category\": \"Sales & Marketing\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"gray\"\n  },\n  {\n    \"title\": \"Email Response Tracker\",\n    \"desc\": \"\",\n    \"url\": \"https://daita-os-production.up.railway.app/os\",\n    \"category\": \"Dashboards\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"red\"\n  },\n  {\n    \"title\": \"Intake Style Guide Developer\",\n    \"desc\": \"\",\n    \"url\": \"https://rfmx-app-intake-style-guide-developer.pages.dev/\",\n    \"category\": \"AI\",\n    \"locationType\": \"web\",\n    \"checkable\": true,\n    \"offlineReason\": \"\",\n    \"tag\": \"purple\"\n  }\n];\n\nconst ADMIN_PASSWORD = \"rfmxccF1gures\";\nconst LOC_LABELS = {web:\"Web\",onedrive:\"OneDrive\",nas:\"NAS Drive\",local:\"Local\"};\nconst TAG_COLORS = {none:'',red:'#ef4444',amber:'#eab308',purple:'#818cf8',green:'#22c55e',gray:''};\nlet editingIndex = null;\nlet currentFilter = \"all\";\nlet activeTab = \"items\";\nlet dragSrcIndex = null;\nlet selectedTag = 'none';\n\n/* ---- favorites + search + live status state ---- */\nconst FAV_KEY='rfmx_cc_favs';\nlet favs=loadFavs();\nlet currentQuery='';\nconst STATUS={};\nfunction loadFavs(){try{const v=JSON.parse(localStorage.getItem(FAV_KEY));if(Array.isArray(v))return v;}catch(e){}return[];}\nfunction saveFavs(){try{localStorage.setItem(FAV_KEY,JSON.stringify(favs));}catch(e){}}\nfunction isFav(t){return favs.indexOf(t)>=0;}\nfunction toggleFav(e,title){e.preventDefault();e.stopPropagation();const i=favs.indexOf(title);if(i>=0)favs.splice(i,1);else favs.push(title);saveFavs();renderDashboard();}\nfunction monogram(n){const w=(n||'').replace(/[^a-zA-Z ]/g,' ').split(/\\s+/).filter(Boolean);return w.slice(0,3).map(x=>x[0].toUpperCase()).join('')||'?';}\nfunction onSearch(v){currentQuery=v||'';renderDashboard();}\nfunction matchesQuery(it){if(!currentQuery.trim())return true;const q=currentQuery.toLowerCase();return (it.title+' '+(it.desc||'')+' '+it.category).toLowerCase().indexOf(q)>=0;}\nfunction escAttr(s){return String(s==null?'':s).replace(/\"/g,'&quot;');}\n\nfunction setFilter(val){\n  currentFilter=val;\n  renderFilters();\n  renderDashboard();\n}\n\nfunction renderFilters(){\n  const bar=document.getElementById('filters');\n  if(!bar) return;\n  const cats=getOrderedCategories(ITEMS);\n  const all=['all'].concat(cats);\n  bar.innerHTML=all.map(function(c){\n    const active=(currentFilter===c)?' active':'';\n    return '<button class=\"filter-btn'+active+'\" data-cat=\"'+escAttr(c)+'\">'+(c==='all'?'All':c)+'<\u002Fbutton>';\n  }).join('');\n  bar.querySelectorAll('.filter-btn').forEach(function(b){\n    b.addEventListener('click',function(){setFilter(b.dataset.cat);});\n  });\n}\n\nfunction getOrderedCategories(items){\n  const allCats=[...new Set(items.map(i=>i.category))];\n  const ordered=CATEGORY_ORDER.filter(c=>allCats.includes(c));\n  const rest=allCats.filter(c=>!CATEGORY_ORDER.includes(c)).sort();\n  return [...ordered,...rest];\n}\n\nfunction groupByCategory(items){\n  const m={};\n  items.forEach(i=>{if(!m[i.category])m[i.category]=[];m[i.category].push(i)});\n  return m;\n}\n\nfunction renderDashboard(){\n  const main=document.getElementById('main');\n  main.innerHTML='';\n  let items=(currentFilter==='all'?ITEMS.slice():ITEMS.filter(i=>i.category===currentFilter)).filter(matchesQuery);\n  updateSummary();\n  const pinned=items.filter(i=>isFav(i.title));\n  if(pinned.length) main.appendChild(buildBand('Pinned',pinned,true));\n  const grouped=groupByCategory(items);\n  getOrderedCategories(items).forEach(function(cat){\n    const ci=grouped[cat];\n    if(ci&&ci.length) main.appendChild(buildBand(cat,ci,false));\n  });\n  if(!items.length){\n    const e=document.createElement('div');\n    e.className='empty';\n    e.textContent='No applications match your search.';\n    main.appendChild(e);\n  }\n}\n\nfunction buildBand(label,items,pinned){\n  const band=document.createElement('div');band.className='band';\n  const lab=document.createElement('div');lab.className='band-label';\n  const mk=pinned?'<span class=\"mk star\">\\u2605<\u002Fspan>':'<span class=\"mk\"><\u002Fspan>';\n  const meta=pinned?(items.length+' pinned'):(items.length+' app'+(items.length!==1?'s':''));\n  lab.innerHTML='<div class=\"name\">'+mk+'<span>'+label+'<\u002Fspan><\u002Fdiv><div class=\"count\">'+meta+'<\u002Fdiv>';\n  band.appendChild(lab);\n  const grid=document.createElement('div');grid.className='band-cards';\n  items.forEach(function(it){grid.appendChild(buildCard(it));});\n  band.appendChild(grid);\n  return band;\n}\n\nfunction buildCard(item){\n  const hasUrl=item.url&&item.url.trim()!=='';\n  const disabled=(item.tag==='gray');\n  const clickable=hasUrl&&!disabled;\n  const w=document.createElement(clickable?'a':'div');\n  if(clickable){w.href=item.url;w.target='_blank';w.rel='noopener noreferrer';}\n  w.className='card';\n  const tag=item.tag||'none';\n  if(tag!=='none') w.classList.add('tag-'+tag);\n  if(!hasUrl) w.classList.add('unreachable');\n  const slug=slugify(item.title);\n  const s=STATUS[slug]||{cls:(item.checkable?'checking':'na'),text:(item.checkable?'Checking\\u2026':(item.offlineReason||(hasUrl?'':'No link')))};\n  const badge=LOC_LABELS[item.locationType]||item.locationType||'';\n  const desc=item.desc||item.offlineReason||'';\n  w.innerHTML=\n    '<div class=\"card-mono\"><div class=\"mono-tile\">'+monogram(item.title)+'<\u002Fdiv>'\n    +'<span class=\"status-dot '+s.cls+'\" data-slug=\"'+slug+'\" title=\"'+escAttr(s.text)+'\"><\u002Fspan><\u002Fdiv>'\n    +'<div class=\"card-body\"><div class=\"card-title\">'+item.title+'<\u002Fdiv>'\n    +'<div class=\"card-sub\"><span class=\"card-desc\">'+desc+'<\u002Fspan>'+(badge?'<span class=\"badge\">'+badge+'<\u002Fspan>':'')+'<\u002Fdiv><\u002Fdiv>'\n    +'<button class=\"fav-star'+(isFav(item.title)?' on':'')+'\" title=\"Pin to top\" type=\"button\">'+(isFav(item.title)?'\\u2605':'\\u2606')+'<\u002Fbutton>';\n  const star=w.querySelector('.fav-star');\n  star.addEventListener('click',function(e){toggleFav(e,item.title);});\n  return w;\n}\n\nfunction applyStatus(slug){\n  const s=STATUS[slug];if(!s)return;\n  document.querySelectorAll('.status-dot[data-slug=\"'+slug+'\"]').forEach(function(d){\n    d.className='status-dot '+s.cls;d.title=s.text;\n  });\n}\n\nfunction updateSummary(){\n  const el=document.getElementById('status-summary');if(!el)return;\n  const checkable=ITEMS.filter(i=>i.checkable);\n  const online=checkable.filter(i=>STATUS[slugify(i.title)]&&STATUS[slugify(i.title)].cls==='online').length;\n  const pending=checkable.some(i=>{const st=STATUS[slugify(i.title)];return !st||st.cls==='checking';});\n  el.innerHTML=pending?('Checking <span>'+checkable.length+'<\u002Fspan> apps\\u2026'):('<span>'+online+'<\u002Fspan> of '+checkable.length+' reachable');\n}\n\nasync function runStatusChecks(){\n  updateSummary();\n  for(const item of ITEMS){\n    const slug=slugify(item.title);\n    if(!item.checkable){STATUS[slug]={cls:'na',text:'Not monitored'};applyStatus(slug);continue;}\n    STATUS[slug]={cls:'checking',text:'Checking\\u2026'};applyStatus(slug);updateSummary();\n    try{\n      const c=new AbortController();\n      const t=setTimeout(()=>c.abort(),6000);\n      await fetch(item.url,{method:'HEAD',mode:'no-cors',signal:c.signal});\n      clearTimeout(t);STATUS[slug]={cls:'online',text:'Reachable'};\n    }catch(e){\n      STATUS[slug]={cls:'offline',text:e.name==='AbortError'?'Timed out':'Unreachable'};\n    }\n    applyStatus(slug);updateSummary();\n  }\n}\n\nfunction openModal(id){document.getElementById(id).classList.add('open')}\nfunction closeModal(id){document.getElementById(id).classList.remove('open')}\n\nfunction openAdminFlow(){\n  document.getElementById('pw-input').value='';\n  document.getElementById('pw-error').textContent='';\n  document.getElementById('pw-input').classList.remove('error');\n  openModal('pw-overlay');\n  setTimeout(()=>document.getElementById('pw-input').focus(),120);\n}\n\nfunction checkPassword(){\n  const val=document.getElementById('pw-input').value;\n  if(val===ADMIN_PASSWORD){closeModal('pw-overlay');openAdminPanel();}\n  else{\n    document.getElementById('pw-error').textContent='Incorrect password.';\n    document.getElementById('pw-input').classList.add('error');\n    document.getElementById('pw-input').value='';\n    setTimeout(()=>document.getElementById('pw-input').focus(),50);\n  }\n}\n\nfunction openAdminPanel(){switchTab('items');openModal('admin-overlay')}\n\nfunction switchTab(tab){\n  activeTab=tab;\n  ['items','cats','export'].forEach(t=>{\n    document.getElementById('tab-'+t).classList.toggle('active',t===tab);\n  });\n  document.getElementById('admin-screen').style.display=tab==='items'?'block':'none';\n  document.getElementById('cat-order-screen').style.display=tab==='cats'?'block':'none';\n  document.getElementById('item-form-screen').style.display='none';\n  document.getElementById('export-screen').style.display=tab==='export'?'block':'none';\n  if(tab==='items') renderItemList();\n  if(tab==='cats') renderCatOrderList();\n}\n\nfunction tagDotStyle(tag){\n  const c=TAG_COLORS[tag||'none'];\n  return c?'background:'+c+';width:10px;height:10px;border-radius:50%;flex-shrink:0'\n          :'background:#35354a;width:10px;height:10px;border-radius:50%;flex-shrink:0';\n}\n\nfunction renderItemList(){\n  document.getElementById('item-count').textContent=ITEMS.length;\n  const list=document.getElementById('item-list');list.innerHTML='';\n  ITEMS.forEach((item,i)=>{\n    const row=document.createElement('div');row.className='item-row';\n    row.innerHTML='<div style=\"'+tagDotStyle(item.tag)+'\"><\u002Fdiv>'\n      +'<div class=\"item-row-info\"><div class=\"item-row-title\">'+item.title+'<\u002Fdiv>'\n      +'<div class=\"item-row-meta\">'+item.category+' &middot; '+LOC_LABELS[item.locationType]+'<\u002Fdiv><\u002Fdiv>'\n      +'<div class=\"item-row-actions\"><button class=\"icon-btn\" onclick=\"showItemForm('+i+')\">Edit<\u002Fbutton>'\n      +'<button class=\"icon-btn delete\" onclick=\"deleteItem('+i+')\">Del<\u002Fbutton><\u002Fdiv>';\n    list.appendChild(row);\n  });\n}\n\nfunction selectTag(tag){\n  selectedTag=tag;\n  document.querySelectorAll('.color-swatch').forEach(s=>{\n    s.classList.toggle('selected',s.dataset.tag===tag);\n  });\n}\n\nfunction showItemForm(index){\n  editingIndex=index;\n  document.getElementById('admin-screen').style.display='none';\n  document.getElementById('item-form-screen').style.display='block';\n  document.getElementById('cat-order-screen').style.display='none';\n  document.getElementById('export-screen').style.display='none';\n  const cats=[...new Set(ITEMS.map(i=>i.category))];\n  document.getElementById('cat-list').innerHTML=cats.map(c=>'<option value=\"'+c+'\">').join('');\n  if(index===null){\n    document.getElementById('form-title').textContent='Add New Item';\n    ['f-title','f-desc','f-url','f-category','f-offlineReason'].forEach(id=>document.getElementById(id).value='');\n    document.getElementById('f-locationType').value='web';\n    selectTag('none');\n  }else{\n    const item=ITEMS[index];\n    document.getElementById('form-title').textContent='Edit Item';\n    document.getElementById('f-title').value=item.title;\n    document.getElementById('f-desc').value=item.desc;\n    document.getElementById('f-url').value=item.url;\n    document.getElementById('f-category').value=item.category;\n    document.getElementById('f-locationType').value=item.locationType;\n    document.getElementById('f-offlineReason').value=item.offlineReason||'';\n    selectTag(item.tag||'none');\n  }\n}\n\nfunction saveItem(){\n  const title=document.getElementById('f-title').value.trim();\n  if(!title){alert('Title is required.');return}\n  const url=document.getElementById('f-url').value.trim();\n  const cat=document.getElementById('f-category').value.trim()||'General';\n  const newItem={\n    title,desc:document.getElementById('f-desc').value.trim(),url,\n    category:cat,locationType:document.getElementById('f-locationType').value,\n    checkable:url!=='',offlineReason:document.getElementById('f-offlineReason').value.trim(),\n    tag:selectedTag\n  };\n  if(editingIndex===null) ITEMS.push(newItem); else ITEMS[editingIndex]=newItem;\n  if(!CATEGORY_ORDER.includes(cat)) CATEGORY_ORDER.push(cat);\n  renderDashboard();\n  switchTab('items');\n}\n\nfunction deleteItem(index){\n  if(confirm('Delete \"'+ITEMS[index].title+'\"?')){\n    ITEMS.splice(index,1);renderDashboard();renderItemList();\n  }\n}\n\nfunction renderCatOrderList(){\n  const allCats=[...new Set(ITEMS.map(i=>i.category))];\n  const orderedCats=CATEGORY_ORDER.filter(c=>allCats.includes(c));\n  const restCats=allCats.filter(c=>!CATEGORY_ORDER.includes(c)).sort();\n  restCats.forEach(c=>{if(!CATEGORY_ORDER.includes(c))CATEGORY_ORDER.push(c)});\n  const displayList=[...orderedCats,...restCats];\n  const list=document.getElementById('cat-order-list');list.innerHTML='';\n  displayList.forEach((cat,i)=>{\n    const row=document.createElement('div');\n    row.className='cat-order-row';row.draggable=true;\n    row.dataset.index=i;row.dataset.cat=cat;\n    const count=ITEMS.filter(item=>item.category===cat).length;\n    row.innerHTML='<span class=\"cat-drag-handle\">::<\u002Fspan><span class=\"cat-order-name\">'+cat+'<\u002Fspan><span class=\"cat-order-count\">'+count+' item'+(count!==1?'s':'')+'<\u002Fspan>';\n    row.addEventListener('dragstart',e=>{dragSrcIndex=i;e.dataTransfer.effectAllowed='move'});\n    row.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.cat-order-row').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over')});\n    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));\n    row.addEventListener('drop',e=>{\n      e.preventDefault();row.classList.remove('drag-over');\n      if(dragSrcIndex===null||dragSrcIndex===i) return;\n      const cats=[...document.querySelectorAll('.cat-order-row')].map(r=>r.dataset.cat);\n      const moved=cats.splice(dragSrcIndex,1)[0];\n      cats.splice(i,0,moved);\n      CATEGORY_ORDER=cats;\n      renderDashboard();renderCatOrderList();\n    });\n    list.appendChild(row);\n  });\n}\n\nfunction downloadFile(){\n  const html=document.documentElement.outerHTML;\n  const m1='let CATEGORY_ORDER = [';\n  const m2end='];\\n\\nconst ADMIN_PASSWORD';\n  const s1=html.indexOf(m1);\n  const e2=html.indexOf(m2end)+m2end.length;\n  const newHTML=html.substring(0,s1)\n    +'let CATEGORY_ORDER = '+JSON.stringify(CATEGORY_ORDER,null,2)\n    +';\\n\\nlet ITEMS = '+JSON.stringify(ITEMS,null,2)\n    +';\\n\\nconst ADMIN_PASSWORD'\n    +html.substring(e2);\n  const blob=new Blob([newHTML],{type:'text/html'});\n  const a=document.createElement('a');\n  a.href=URL.createObjectURL(blob);a.download='index.html';a.click();\n  URL.revokeObjectURL(a.href);\n}\n\nfunction slugify(str){return str.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')}\n\ndocument.querySelectorAll('.modal-overlay').forEach(o=>{\n  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')});\n});\n\nwindow.addEventListener('DOMContentLoaded',function(){\n  document.querySelectorAll('.modal-overlay').forEach(function(el){\n    el.classList.remove('open');\n    el.style.display='none';\n  });\n  renderFilters();\n  renderDashboard();\n  runStatusChecks();\n  setTimeout(function(){\n    document.querySelectorAll('.modal-overlay').forEach(function(el){\n      el.style.display='';\n    });\n  },100);\n});\n<\u002Fscript>\n<script>document.getElementById('rfmx-logo').src='data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAQ4CK4DASIAAhEBAxEB/8QAHQABAQACAwEBAQAAAAAAAAAAAAEICQIGBwUDBP/EAG8QAAIBAwIDBAEMCQwMCgcFCQABAgMEEQUGBxIhCBMxQSIJFBYYMlFWYZSV0tMVFzdVV3GBtNQjM0JTdXaRkqWxs9EkJzhDUnN0hJOhwcIlNE
